name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "NexFlow/backend/**"
  pull_request:
    branches: [main]
    paths:
      - "NexFlow/backend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/nexflow-backend

jobs:
  # ── Stage 1: Run unit tests ────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: NexFlow/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: NexFlow/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379/0"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          FERNET_KEY: "ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg="
          ENVIRONMENT: "test"
        run: pytest tests/ -v --tb=short

  # ── Stage 2: Build & push Docker image to GHCR ────────────────────────────
  build:
    name: Build & Push Image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: NexFlow/backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # ── Stage 3: Deploy to Render ──────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render deploy
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            || echo "::warning::Render deploy hook failed — check RENDER_DEPLOY_HOOK_URL secret"
